spring.datasource.url=jdbc:h2:mem:velocitydb;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# Path to input file (override with --app.input.file=/path/to/input.txt)
app.input.file=input.txt
# Optional output file; if blank, results go to stdout only
app.output.file=

logging.level.com.venn=INFO
